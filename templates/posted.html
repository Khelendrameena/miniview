<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vlog Upload Confirmation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f4f7fc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .confirmation-box {
      background-color: white;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      width: 100%;
    }

    .checkmark {
      font-size: 50px;
      color: #4caf50;
    }

    h2 {
      margin: 20px 0;
      font-size: 24px;
      color: #333;
    }

    p {
      font-size: 16px;
      color: #555;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      background-color: #0078ff;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #005bb5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="confirmation-box">
      <div class="checkmark">
        ✔
      </div>
      <h2>Your Vlog was uploaded successfully!</h2>
      <p>Your vlog has been uploaded to the platform. You can now share it with your audience.</p>
      <button onclick="goToHomePage()">Go to Home</button>
    </div>
  </div>

  <script>
    function goToHomePage() {
      window.location.href = 'index.html';  // Redirect to your home page or dashboard
    }
  </script>
</body>
</html>
