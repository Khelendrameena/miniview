<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vlog Editor</title>

    <!-- Add the Prism CSS for syntax highlighting (tomorrow theme for dark background) -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />

  <!-- Add Prism JS for syntax highlighting -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<link rel="stylesheet" href="vlog_des_1.css">
</head>
<body>

<header>
  Vlog Editor
</header>
<div class="editor-container" id="editor-container">
  <!-- Toolbar -->
  <div class="editor-toolbar">
    <button onclick="formatText('bold')">Bold</button>
    <button onclick="formatText('italic')">Italic</button>
    <button onclick="formatText('underline')">Underline</button>
    <button onclick="formatText('insertOrderedList')">Numbered List</button>
    <button onclick="formatText('insertUnorderedList')">Bulleted List</button>
    <button onclick="addHeading()">Add Heading</button>
    <button onclick="addText()">Add Text</button>
    <button onclick="uploadImage()">Add Image</button>
    <button onclick="addCode()">Add Code</button>
    <p hidden id="username">{{ user.username }}</p>
  </div>

  <!-- Editor Area -->
  <div id="editor" contenteditable="true" class="editor-area">
    Start creating your vlog here...
  </div>

  <!-- Action Buttons -->
  <button class="submit-btn" onclick="submitCode()">Submit</button>
</div>
<!-- Loader -->
<div id="loader" class="loader"></div>
<script src='vlog_des_3.js'>
</script>
<script>
  function goToHomePage() {
  window.location.href = '/'; // Redirect to your home page or dashboard
}
</script>
</body>
</html>
