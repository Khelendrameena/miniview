<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsflow</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
  <link href="https://unpkg.com/tailwindcss@^1.0/dist/tailwind.min.css" rel="stylesheet">

  <style>
    @import url('https://fonts.googleapis.com/css?family=Poppins:400,500,600,700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    .scroll-container {
      height: 90vh;
      overflow-y: scroll;
      margin: 20px 0;
      padding: 10px;
      border: 1px solid #ccc;
      background-color: #f9f9f9;
    }

    .coment_8 {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #f3f4f6;
      padding: 10px 20px;
      box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.1);
    }

    .coment_8 input {
      width: calc(100% - 100px);
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      margin-right: 10px;
    }

    .coment_8 button {
      padding: 10px 20px;
      background-color: #4158d0;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .coment_8 button:hover {
      background-color: #c850c0;
    }

    .comment-item {
      display: flex;
      align-items: flex-start;
      margin-bottom: 10px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 5px;
      padding: 10px;
      position: relative;
      word-wrap: break-word;
      max-width: 100%;
    }

    .profile-img-container {
      flex-shrink: 0;
      margin-right: 10px;
    }

    .profile-img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    .comment-content {
      flex-grow: 1;
      padding-left: 5px;
      word-wrap: break-word;
    }

    .comment-content h3 {
      margin: 0 0 5px 0;
      font-size: 14px;
      color: #4158d0;
    }

    .comment-content p {
      margin: 0;
      color: #333;
    }

    .like-section {
      position: absolute;
      top: 5px;
      right: 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .like-button {
      cursor: pointer;
      color: #888;
    }

    .like-button:hover {
      color: #4158d0;
    }

    .like-count {
      font-size: 12px;
      background-color: #eee;
      padding: 2px 5px;
      border-radius: 3px;
    }
  </style>
</head>

<body>
  <section class="text-gray-600 body-font">
    <div class="scroll-container" id="commentContainer">
      <!-- Comments will appear here dynamically -->
    </div>

    <div class="coment_8">
      <input type="text" id="commentInput" placeholder="Write a comment..." />
      <button type="submit" id="postCommentButton">Post</button>
    </div>
  </section>

  <script>
    const data = JSON.parse('{{ data|safe }}');

    // Load existing comments
    for (let x of data) {
      addComment(x.fields.mess, x.fields.name, x.fields.like, 0, x.pk);
    }

    function id(mess, name, like) {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/coment/add', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('X-CSRFToken', '{{ csrf_token }}');
      xhr.send(JSON.stringify({ mess: mess, name: name, like: like }));
    }

    function come(commentId, like) {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/coment/count', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('X-CSRFToken', '{{ csrf_token }}');
      xhr.onreadystatechange = () => {
        if (xhr.readyState === XMLHttpRequest.DONE) {
          if (xhr.status === 200) {
            console.log('Like updated successfully');
          } else {
            console.error('Failed to update like:', xhr.responseText);
          }
        }
      };
      xhr.send(JSON.stringify({ id: commentId, like: like }));
    }

    document.getElementById("postCommentButton").addEventListener('click', () => {
      const commentInput = document.getElementById('commentInput');
      const name = `{{ request.user }}`;
      addComment(commentInput, name, 0, 1);
    });

    function addComment(commentInput, name, like, call, commentId) {
      const commentContainer = document.getElementById('commentContainer');

      let commentText = call === 1 ? commentInput.value.trim() : commentInput;
      if (!commentText) {
        alert('Please enter a comment before posting!');
        return;
      }

      const sanitizedComment = commentText.replace(/</g, "&lt;").replace(/>/g, "&gt;");
      const uniqueId = commentId || Date.now();

      const commentItem = document.createElement('div');
      commentItem.className = 'comment-item';
      commentItem.innerHTML = `
        <div class="profile-img-container">
          <img src="https://ui-avatars.com/api/?name=${name.split(' ')[0]}" alt="Profile Picture" class="profile-img">
        </div>
        <div class="comment-content">
          <h3>${name}</h3>
          <p>${sanitizedComment}</p>
        </div>
        <div class="like-section">
          <span class="like-count" id="likeCount-${uniqueId}">${like}</span>
          <i class="like-button fas fa-heart"></i>
        </div>
      `;

      commentContainer.appendChild(commentItem);

      const likeButton = commentItem.querySelector('.like-button');
      const likeCount = commentItem.querySelector(`#likeCount-${uniqueId}`);

      likeButton.addEventListener('click', function handleLikeClick() {
        const updatedLikes = parseInt(likeCount.textContent, 10) + 1;
        likeCount.textContent = updatedLikes;

        if (call === 0) {
          come(commentId, updatedLikes);
        }

        likeButton.removeEventListener('click', handleLikeClick);
      });

      if (call === 1) {
        commentInput.value = '';
        id(sanitizedComment, name, like);
      }

      commentContainer.scrollTop = commentContainer.scrollHeight;
    }
  </script>
</body>

</html>
