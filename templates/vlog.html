<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vlog Posting Template</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .vlog-container {
      background: #ffffff;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      padding: 20px;
      max-width: 500px;
      width: 100%;
    }

    .vlog-container h1 {
      font-size: 1.8rem;
      color: #333333;
      text-align: center;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      color: #555555;
    }

    .form-group textarea {
      width: 100%;
      padding: 10px 0px 10px 5px;
      font-size: 1rem;
      border: 1px solid #ddd;
      border-radius: 5px;
      resize: none;
      transition: border-color 0.3s;
    }

    .form-group textarea:focus {
      border-color: #6c63ff;
      outline: none;
    }

    #title {
      height: 40px;
    }

    #description {
      height: 150px;
    }

    .submit-btn {
      display: block;
      width: 100%;
      background: #572A87;
      color: #ffffff;
      font-size: 1.2rem;
      border: none;
      border-radius: 5px;
      padding: 10px 0;
      cursor: pointer;
      transition: background 0.3s;
    }

    .submit-btn:hover {
      background: #574fe4;
    }
  </style>
</head>
<body>
  <div class="vlog-container">
    <form action="/@{{ user.username }}/vlog" method="POST" enctype="multipart/form-data">
      {% csrf_token %}
    <h1>Create a New Vlog</h1>
    <div class="form-group">
      <label for="title">Thumbnail</label>
      <textarea id="" placeholder="Upload your vlog thumbnail..." readonly></textarea>
      <input type="file" name="thumbnail" id="" style="position: relative; top: -30px; left: 10px;">
    </div>
    <div class="form-group">
      <label for="title">Title</label>
      <textarea id="title" placeholder="Enter the vlog title..." name="title"></textarea>
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" placeholder="Write a detailed description..." name="description"></textarea>
    </div>
    <button class="submit-btn">Post Vlog</button>
   </form>
  </div>

  <script>
    // Add functionality if needed, for example, handling form submission
    document.querySelector('.submit-btn').addEventListener('click', () => {
      const title = document.getElementById('title').value.trim();
      const description = document.getElementById('description').value.trim();

      if (!title || !description) {
        alert('Please fill out both fields!');
        return;
      }

    });
  </script>
</body>
</html>
