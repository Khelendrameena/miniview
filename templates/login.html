
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link href="https://unpkg.com/tailwindcss@^1.0/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
  <div class="flex justify-center items-center h-screen">
    <div class="w-full max-w-sm bg-white rounded-lg shadow-md p-6">
      <h2 class="text-2xl font-semibold text-gray-900 text-center mb-6">Login</h2>
      <form action="/login/auth" method="POST" class="mb-6">
        <div class="mb-4">
          <label for="email" class="block text-sm font-medium text-gray-700 mb-2" style="text-align: center;">ID</label>
          <input type="text" id="email" name="id" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 text-gray-700 outline-none" placeholder="Enter your id" required>
        </div>

        <button type="submit" class="w-full bg-indigo-500 text-white py-2 px-4 rounded-md hover:bg-indigo-600 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-opacity-75">
          Login
        </button>
      </form>

      <p class="text-sm text-gray-500 text-center mt-4">
        Don't have an account? <a href="/signup" class="text-indigo-500 hover:underline">Sign up</a>
      </p>
    </div>
  </div>
</body>
</html>
