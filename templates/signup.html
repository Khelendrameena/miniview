{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup</title>
  <link href="https://unpkg.com/tailwindcss@^1.0/dist/tailwind.min.css" rel="stylesheet">
  <script>
    function validatePasswords(event) {
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirm_password").value;
      if (password !== confirmPassword) {
        event.preventDefault();
        alert("Your passwords do not match. Please try again.");
      }
    }
  </script>
</head>
<body class="bg-gray-100">
  <div class="flex justify-center items-center h-screen">
    <div class="w-full max-w-md bg-white rounded-lg shadow-md p-6">
      <h2 class="text-2xl font-semibold text-gray-900 text-center mb-6">Sign Up</h2>
      <form action="/signup/auth" method="POST" onsubmit="validatePasswords(event)">
{% csrf_token %}

        <div class="mb-4">
          <label for="email" class="block text-sm font-medium text-gray-700 mb-2">name</label>
          <input type="text" id="email" name="name" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 text-gray-700 outline-none" placeholder="Enter your name" required>
        </div>
        
        <div class="mb-4">
          <label for="email" class="block text-sm font-medium text-gray-700 mb-2">username</label>
          <input type="text" id="email" name="username" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 text-gray-700 outline-none" placeholder="Enter your username" required>
        </div>
        
        <div class="mb-4">
          <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
          <input type="email" id="email" name="email" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 text-gray-700 outline-none" placeholder="Enter your email" required>
        </div>
        <div class="mb-4">
          <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
          <input type="password" id="password" name="password" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 text-gray-700 outline-none" placeholder="Enter your password" required>
        </div>
        <div class="mb-6">
          <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
          <input type="password" id="confirm_password" name="confirm_password" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 text-gray-700 outline-none" placeholder="Confirm your password" required>
        </div>
        <button type="submit" class="w-full bg-indigo-500 text-white py-2 px-4 rounded-md hover:bg-indigo-600 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-opacity-75">
          Sign Up
        </button>
{% if error %} <p>{{ error }}</p> {% endif %}
      </form>
      <div class="flex items-center justify-center space-x-4 mt-6">
        <a href="{% url 'socialaccount_login' 'google' %}?next=/" class="btn btn-primary">
    Sign Up with Google
        </a>
      </div>
      <p class="text-sm text-gray-500 text-center mt-4">
        Already have an account? <a href="/login" class="text-indigo-500 hover:underline">Login</a>
      </p>
    </div>
  </div>
</body>
</html>
