<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTP Authentication</title>
  <link href="https://unpkg.com/tailwindcss@^1.0/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
  <div class="flex justify-center items-center h-screen">
    <div class="w-full max-w-sm bg-white rounded-lg shadow-md p-6">
      <h2 class="text-2xl font-semibold text-gray-900 text-center mb-6">Enter OTP</h2>
      <p class="text-sm text-gray-600 text-center mb-4">We have sent a 6-digit OTP to your email. Please enter it below to verify your account.</p>
      <form action="/otp/verify" method="POST">
{% csrf_token %}
        <div class="mb-6">
          <label for="otp" class="block text-sm font-medium text-gray-700 mb-2">OTP</label>
          <input type="text" id="otp" name="otp" maxlength="6" pattern="[0-9]{6}" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 text-gray-700 outline-none text-center text-lg tracking-widest" placeholder="Enter OTP" required>
        </div>
        <button type="submit" class="w-full bg-indigo-500 text-white py-2 px-4 rounded-md hover:bg-indigo-600 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-opacity-75">
          Verify OTP
        </button>
{% if error %} <p>{{ error }}</p> {% endif %}
      </form>
      <p class="text-sm text-gray-500 text-center mt-4">
        Didn't receive an OTP? <a href="/otp/resend" class="text-indigo-500 hover:underline">Resend OTP</a>
      </p>
    </div>
  </div>
</body>
</html>
